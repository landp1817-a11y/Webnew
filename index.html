<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* خلفية الفيديو */
.video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    overflow: hidden;
}

.video-background video {
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    transform: translate(-50%, -50%);
    object-fit: cover;
}

/* طبقة مظللة فوق الفيديو عشان النص يبان */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: -1;
}

body {
    min-height: 100vh;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    padding: 20px;
    cursor: default;
    position: relative;
}

.card {
    background: linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 40px 35px;
    text-align: center;
    color: white;
    box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
    transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    width: 320px;
    cursor: default;
    transform-style: preserve-3d;
    z-index: 1;
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 20px;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

.avatar:hover {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.8);
}

h2 {
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 1px;
    font-weight: 600;
    background: linear-gradient(135deg, #fff, #ddd);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

p {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

.links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

.links a {
    display: inline-block;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.links img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.links a:hover img {
    transform: translateY(-8px) scale(1.1);
    background: rgba(255,255,255,0.25);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.links:hover img:not(:hover) {
    opacity: 0.5;
    transform: scale(0.95);
}

.small-note {
    margin-top: 25px;
    font-size: 11px;
    opacity: 0.5;
    letter-spacing: 0.5px;
}

.card:hover {
    box-shadow: 0 30px 55px rgba(0,0,0,0.4);
}

.soundcloud-wrapper {
    margin: 15px 0;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(5px);
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.3s ease;
}

.soundcloud-wrapper:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-2px);
}

.soundcloud-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.soundcloud-icon {
    font-size: 12px;
    animation: pulse 1.5s ease infinite;
}

.soundcloud-title {
    font-size: 11px;
    font-weight: 500;
    opacity: 0.9;
    flex: 1;
}

.soundcloud-live {
    font-size: 8px;
    background: #ff4444;
    padding: 2px 6px;
    border-radius: 20px;
    animation: blink 1.5s ease infinite;
}

@keyframes blink {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; background: #ff6666; }
}

.custom-player {
    padding: 12px;
}

.player-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.play-pause-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.play-pause-btn:hover {
    background: rgba(255,255,255,0.35);
    transform: scale(1.05);
}

.progress-container {
    flex: 1;
    min-width: 150px;
}

.progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 5px;
}

.progress-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #5f9e9e, #8fcaca);
    border-radius: 10px;
    transition: width 0.1s linear;
}

.time-info {
    font-size: 10px;
    opacity: 0.6;
    text-align: right;
}

.volume-control {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.volume-control span {
    font-size: 12px;
    opacity: 0.7;
}

#volumeSlider {
    width: 60px;
    height: 3px;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
    outline: none;
}

#volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #8fcaca;
    cursor: pointer;
}

@keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
}
</style>

</head>

<script>
const audio = document.getElementById('music');
const playPauseBtn = document.getElementById('playPauseBtn');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const currentTimeSpan = document.getElementById('currentTime');
const durationSpan = document.getElementById('duration');
const volumeSlider = document.getElementById('volumeSlider');
const liveStatus = document.querySelector('.soundcloud-live');
const card = document.querySelector(".card");

let isPlaying = false;

// حركة الكرت 3D
card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    const rotateX = -(y - centerY) / 20;
    const rotateY = (x - centerX) / 20;
    const glowX = (x / rect.width) * 100;
    const glowY = (y / rect.height) * 100;
    
    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
    card.style.background = `radial-gradient(circle at ${glowX}% ${glowY}%, rgba(255,255,255,0.15), rgba(255,255,255,0.05))`;
});

card.addEventListener("mouseleave", () => {
    card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px)";
    card.style.background = "linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%)";
});

card.addEventListener("mouseenter", () => {
    card.style.transition = "all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1)";
});

// مشغل الصوت
audio.addEventListener('loadedmetadata', () => {
    durationSpan.textContent = formatTime(audio.duration);
});

audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        progressFill.style.width = `${percent}%`;
        currentTimeSpan.textContent = formatTime(audio.currentTime);
    }
});

playPauseBtn.addEventListener('click', () => {
    if (isPlaying) {
        audio.pause();
        playPauseBtn.textContent = '▶️';
        if (liveStatus) {
            liveStatus.textContent = '● PAUSED';
            liveStatus.style.background = '#888';
            liveStatus.style.animation = 'none';
        }
    } else {
        audio.play();
        playPauseBtn.textContent = '⏸️';
        if (liveStatus) {
            liveStatus.textContent = '● PLAYING';
            liveStatus.style.background = '#44ff44';
            liveStatus.style.animation = 'blink 1.5s ease infinite';
        }
    }
    isPlaying = !isPlaying;
});

progressBar.addEventListener('click', (e) => {
    const rect = progressBar.getBoundingClientRect();
    const percent = (e.clientX - rect.left) / rect.width;
    audio.currentTime = percent * audio.duration;
});

volumeSlider.addEventListener('input', () => {
    audio.volume = volumeSlider.value;
});

audio.addEventListener('ended', () => {
    isPlaying = false;
    playPauseBtn.textContent = '▶️';
    if (liveStatus) {
        liveStatus.textContent = '● ENDED';
        liveStatus.style.background = '#888';
    }
    audio.currentTime = 0;
    progressFill.style.width = '0%';
});

audio.addEventListener('error', () => {
    console.log('خطأ في تحميل الصوت');
    if (liveStatus) {
        liveStatus.textContent = '● ERROR';
        liveStatus.style.background = '#ff4444';
    }
});

// منع النقر بزر الماوس الأيمن (كليك يمين)
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
});

// منع اختصار Ctrl+C و Ctrl+V و Ctrl+X
document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && (e.key === 'c' || e.key === 'v' || e.key === 'x' || e.key === 'a')) {
        e.preventDefault();
        return false;
    }
});

// التشغيل التلقائي بعد أول ضغطة
document.body.addEventListener('click', function autoPlay() {
    if (audio && audio.paused) {
        audio.play();
        if (playPauseBtn) playPauseBtn.textContent = '⏸️';
        if (liveStatus) {
            liveStatus.textContent = '● PLAYING';
            liveStatus.style.background = '#44ff44';
        }
        isPlaying = true;
    }
    document.body.removeEventListener('click', autoPlay);
}, { once: true });

function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
}
</script>
