<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>My Profile</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2f5f5f;
    font-family:Arial;
    color:white;
}

/* الكرت */
.card {
    transition: transform 0.2s ease, box-shadow 0.2s;
    transform-style: preserve-3d;
    will-change: transform;
}

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* الصورة */
.avatar {
    width:80px;
    height:80px;
    border-radius:50%;
    margin-bottom:10px;
}

/* الروابط */
.links img {
    width:30px;
    margin:5px;
    cursor:pointer;
    transition:0.3s;
}
.links {
    display: flex;
    justify-content: center;
    gap: 12px;
}

/* الشكل الأساسي */
.links img {
    width: 35px;
    transition: all 0.3s ease;
    filter: grayscale(100%);
}

/* لما تحط الماوس */
.links img:hover {
    transform: translateY(-12px) scale(1.3) rotate(5deg);
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* تأثير إضافي للباقي */
.links:hover img:not(:hover) {
    transform: scale(0.9);
    opacity: 0.5;
}
</style>

</head>
<body>

<div class="card">
    <img src="imags\star.jpg" class="avatar">
    <h2>deat</h2>
    <p>web hacking </p>

<div class="links">
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png"></a>
</div>

<script>
const card = document.querySelector(".card");

card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = -(y - centerY) / 15;
    const rotateY = (x - centerX) / 15;

    card.style.transform =
        `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
});

card.addEventListener("mouseleave", () => {
    card.style.transform = "rotateX(0) rotateY(0) scale(1)";
});
</script>

</body>
</html>
