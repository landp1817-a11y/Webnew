<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>My Profile | Deat</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a3a3a 0%, #2d5a5a 100%);
    font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    padding: 20px;
}

/* الكرت الرئيسي - تصميم دائري أنيق */
.card {
    background: linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 40px 35px;
    text-align: center;
    color: white;
    box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
    transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    width: 320px;
    cursor: default;
    transform-style: preserve-3d;
}

/* الصورة - تصميم دائري مع إطار */
.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 20px;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    transition: all 0.3s ease;
}

.avatar:hover {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.8);
}

/* الاسم */
h2 {
    font-size: 28px;
    margin-bottom: 8px;
    letter-spacing: 1px;
    font-weight: 600;
    background: linear-gradient(135deg, #fff, #ddd);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

/* الوصف */
p {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 25px;
    letter-spacing: 1px;
}

/* الروابط - تصميم دائري أنيق */
.links {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

.links a {
    display: inline-block;
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}

.links img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* تأثير hover على الأيقونات */
.links a:hover img {
    transform: translateY(-8px) scale(1.1);
    background: rgba(255,255,255,0.25);
    box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

/* تأثير خاص: لما تمر على منطقة الروابط، الباقي يبهت شوي */
.links:hover img:not(:hover) {
    opacity: 0.5;
    transform: scale(0.95);
}

/* نص صغير تحت الروابط */
.small-note {
    margin-top: 25px;
    font-size: 11px;
    opacity: 0.5;
    letter-spacing: 0.5px;
}

/* تأثير للكرت عند تحريك الماوس */
.card:hover {
    box-shadow: 0 30px 55px rgba(0,0,0,0.4);
}
</style>

</head>
<body>

<div class="card">
    <img src="images/star.jpg" class="avatar" alt="profile" onerror="this.src='https://via.placeholder.com/120x120?text=🌟'">
    <h2>deat</h2>
    <p>⚡ Web Hacking | Security Enthusiast ⚡</p>

    <div class="links">
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="twitter"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" alt="instagram"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" alt="github"></a>
        <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="telegram"></a>
    </div>
    <div class="small-note">✨ follow for more ✨</div>
</div>

<script>
const card = document.querySelector(".card");

// حركة 3D رائعة مع الماوس
card.addEventListener("mousemove", (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    
    // حركة أكثر نعومة وزاوية أقل
    const rotateX = -(y - centerY) / 20;
    const rotateY = (x - centerX) / 20;
    
    // تأثير انعكاس الضوء (glow)
    const glowX = (x / rect.width) * 100;
    const glowY = (y / rect.height) * 100;
    
    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
    card.style.background = `radial-gradient(circle at ${glowX}% ${glowY}%, rgba(255,255,255,0.15), rgba(255,255,255,0.05))`;
});

// لما يطلع الماوس - يرجع طبيعي بحركة ناعمة
card.addEventListener("mouseleave", () => {
    card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px)";
    card.style.background = "linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%)";
});

// إضافة تأثير عند دخول الماوس
card.addEventListener("mouseenter", () => {
    card.style.transition = "all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1)";
});
</script>

</body>
</html>
